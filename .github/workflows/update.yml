name: Gulcher Feed Update

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Step 3: Install dependencies (if needed)
      - name: Install Python packages
        run: pip install requests beautifulsoup4

      # Step 4: Run the calendar generator
      - name: Generate ICS feed
        run: python generate_calendar.py

      # Step 5: Commit & push only if changes exist
      - name: Commit and push updates
        run: |
          git config user.name "gulcher-bot"
          git config user.email "bot@gulcher.local"
          git add gulcher-traffic.ics
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "Update ICS feed"
          git push origin HEAD:main